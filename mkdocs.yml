site_name: "Advento"
site_description: "Lore e documentação oficial do MMORPG cristão Advento"
site_url: "https://SEU_USUARIO.github.io/advento-journey/"
repo_url: "https://github.com/SEU_USUARIO/advento-journey"
repo_name: "advento-journey"

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: slate
      primary: light green
      accent: brown
      toggle:
        icon: material/brightness-4
        name: Modo claro
    - scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Modo escuro
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - toc.follow

plugins:
  - search:
      lang: pt

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - tables
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: "https://github.com/SEU_USUARIO/advento-journey"

nav:
  - 'Home': index.md
  - 'Visão Geral':
    - 'Pilares':
      - 'Conceito Central': visao-geral/pilares/conceito-central.md
