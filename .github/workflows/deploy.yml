name: Deploy MkDocs → GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout advento-journey
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout advento-gdd
        uses: actions/checkout@v4
        with:
          repository: wallaceanjos/advento-gdd
          path: ../advento-gdd

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Sincronizar GDD → docs/
        run: python sync_gdd.py --github-user wallaceanjos

      - name: Build e deploy
        run: mkdocs gh-deploy --force
